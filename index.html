<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrunchiGo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family: 'Poppins', sans-serif;
  background:#f5f5f5;
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:#ff6a00;
  color:white;
}

.logo {
  font-size:24px;
  font-weight:600;
}

.cart-box {
  background:white;
  color:black;
  padding:8px 15px;
  border-radius:20px;
}

/* NAV */
nav {
  display:flex;
  justify-content:center;
  gap:30px;
  background:#222;
  padding:10px;
}

nav a {
  color:white;
  text-decoration:none;
}

/* HERO */
.hero {
  height:300px;
  background:url('https://images.unsplash.com/photo-1585238342028-4c9e6d6b8f9d') center/cover;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  font-size:32px;
  font-weight:bold;
}

/* PRODUCTS */
.products {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:20px;
}

.card {
  background:white;
  border-radius:15px;
  padding:15px;
  text-align:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  transition:0.3s;
}

.card:hover {
  transform:translateY(-5px);
}

.card img {
  width:100%;
  border-radius:10px;
}

.price {
  color:#ff6a00;
  font-weight:bold;
  margin:10px 0;
}

button {
  background:#ff6a00;
  border:none;
  color:white;
  padding:10px 15px;
  border-radius:8px;
  cursor:pointer;
}

/* FOOTER */
footer {
  text-align:center;
  background:#222;
  color:white;
  padding:15px;
}
</style>
</head>

<body>

<header>
  <div class="logo">🥔 CrunchiGo</div>
  <div class="cart-box" id="cart">Cart: 0</div>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#">Products</a>
  <a href="#">Cart</a>
</nav>

<div class="hero">
  Har Bite Mein Crunch!
</div>

<section class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1585238342028-4c9e6d6b8f9d">
<h3>Classic Chips</h3>
<p class="price">₹20</p>
<button onclick="addToCart()">Add</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1617196038434-3c1b90e1c13d">
<h3>Spicy Chips</h3>
<p class="price">₹30</p>
<button onclick="addToCart()">Add</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1590080875852-ba44f83ff6d7">
<h3>Masala Chips</h3>
<p class="price">₹25</p>
<button onclick="addToCart()">Add</button>
</div>

</section>

<footer>
© 2026 CrunchiGo | Premium Snacks
</footer>

<script>
let count = 0;

function addToCart(){
  count++;
  document.getElementById("cart").innerText = "Cart: " + count;
}
</script>

</body>
</html>
